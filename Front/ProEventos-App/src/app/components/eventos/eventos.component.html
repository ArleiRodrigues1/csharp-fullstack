<app-title [title]="'Eventos'"></app-title>

<div class="row row-cols-lg-auto g-3 align-items-center">
  <div>
    <label class="visually-hidden" for="inlineFormInputGroupUsername"></label>
    <div class="input-group">
      <h4 class="mt-1">Filtro:</h4>
      <input type="text"
      class="form-control ms-3 mb-4"
      placeholder="Buscar..."
      [(ngModel)]="filtroLista"
      />
    </div>
  </div>
</div>

<table class="table table-striped">
  <thead class="table-dark">
    <tr>
      <th class="text-center" scope="col">
        <button class="btn btn-outline-light btn-sm" (click)="alterarImg()">
          {{!mostrarImg? 'Exibir' : 'Ocultar'}}
          <i class="{{!mostrarImg? 'fa fa-eye' : 'fa fa-eye-slash'}}"></i>
        </button>
      </th>
      <th class="text-center" scope="col">#</th>
      <th class="text-center" scope="col">Tema</th>
      <th class="text-center" scope="col">Data</th>
      <th class="text-center" scope="col">Local</th>
      <th class="text-center" scope="col">Lote</th>
      <th class="text-center" scope="col">Público </th>
      <th class="text-center" scope="col">Opções</th>
    </tr>
  </thead>
  <tbody *ngIf="eventos && eventos.length">
    <tr *ngFor="let item of eventosFiltrados">
      <td class="text-center">
        <img *ngIf="mostrarImg"
         src="../../assets/{{item.imagemURL}}" alt="">
      </td>
      <td class="text-center">{{item.id}}</td>
      <td class="text-center">{{item.tema}}</td>
      <td class="text-center">{{item.dataEvento | DateFormatPipe}}</td>
      <td class="text-center">{{item.local}}</td>
      <td class="text-center">{{item.lotes[0].nome}}</td>
      <td class="text-center">{{item.qtdPessoas}}</td>
      <td>
        <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="tooltip" title="Editar" (click)="openModal(template)">
         <i class ="fa fa-edit"></i>
        </button>
        <button class="btn btn-danger btn-sm ms-2"  data-bs-toggle="tooltip" title="Excluir" (click)="openModal(template)">
          <i class ="fa fa-trash"></i>
        </button>
   </td>
    </tr>
  </tbody>
  <tfoot>
    <tr *ngIf="!eventos.length">
      <td colspan="8" class="text-center">
        <h4>Nenhum evento encontrado !</h4>
      </td>
    </tr>
  </tfoot>
</table>

<!-- DELETAR -->
<ng-template #template>
  <div class="modal-header">
    <h4 class="modal-title pull-left">Excluir</h4>
    <button type="button" class="btn-close close pull-right" aria-label="Close" (click)="modalRef?.hide()">
      <span aria-hidden="true" class="visually-hidden">&times;</span>
    </button>
  </div>
  <div class="modal-body text-center">
    <p>Tem certeza que deseja deletar este evento?</p>
    <button type="button" class="btn btn-danger" (click)="confirm()">Sim</button>
    <button type="button" class="btn btn-default" (click)="decline()">Não</button>
  </div>
</ng-template>
