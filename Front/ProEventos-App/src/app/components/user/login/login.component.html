 <div class="d-flex align-items-center">
    <div class="mx-auto text-center shadow-sm bg-white rounded p-5 my-5 mb-5">
      <form class="form-signin">
        <i class="fa fa-user circle"></i>
        <h1 class="h3 mb-3 font-weight-normal">Login</h1>
        <label for="username" class="sr-only">Usuário</label>
        <input type="email" id="username" class="form-control" placeholder="Usuário" name="username" required>
        <label for="password" class="sr-only">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Senha" name="password" required>
        <button class="btn btn-lg btn-primary btn-block" type="submit"><a href="dashboard" class="text-white" style="text-decoration: none !important; font-size: 15px !important;">Entrar</a></button>
        <p class="mt-4 mb-2 text-muted">Não tem login? <a href="/user/registration">Cadastre-se</a></p>
      </form>
    </div>
  </div>
