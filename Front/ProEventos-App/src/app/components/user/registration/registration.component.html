<div class="container">
  <div class="row py-5 mt-4 align-items-center">
      <!-- For Demo Purpose -->
      <div class="col-md-5 pr-lg-5 mb-5 mb-md-0">
          <img src="../../../../assets/img/registration.svg" alt="" class="img-fluid mb-3 d-none d-md-block">
          <h1>Crie sua Conta</h1>
      </div>

      <!-- Registeration Form -->
      <div class="col-md-7 col-lg-6 ml-auto">
          <form action="#">
              <div class="row">
                  <!-- Name -->
                  <div class="input-group col-lg-6 mb-4">
                      <div class="input-group-prepend">
                          <!-- <span class="input-group-text bg-white px-4 border-md border-right-0">
                              <i class="fa fa-user text-muted"></i>
                          </span> -->
                      </div>
                      <input id="firstName" type="text" name="firstname" placeholder="Nome" class="form-control bg-white border-left-0 border-md">
                      <input id="lastName" type="text" name="lastname" placeholder="Sobrenome" class="form-control bg-white border-left-0 border-md ms-1">
                  </div>
                  <!-- Email Address -->
                  <div class="input-group col-lg-12 mb-4">
                      <div class="input-group-prepend">
                          <!-- <span class="input-group-text bg-white px-4 border-md border-right-0">
                              <i class="fa fa-envelope text-muted"></i>
                          </span> -->
                      </div>
                      <input id="email" type="email" name="email" placeholder="Email" class="form-control bg-white border-left-0 border-md">
                  </div>
                  <!-- Password -->
                  <div class="input-group col-lg-6 mb-4">
                      <div class="input-group-prepend">
                          <!-- <span class="input-group-text bg-white px-4 border-md border-right-0">
                          </span> -->
                      </div>
                      <input id="password" type="password" name="password" placeholder="Digite a senha" class="form-control bg-white border-left-0 border-md">
                  </div>
                  <!-- Password Confirmation -->
                  <div class="input-group col-lg-6 mb-4">
                      <div class="input-group-prepend">
                          <!-- <span class="input-group-text bg-white px-4 border-md border-right-0">
                              <i class="fa fa-lock text-muted"></i>
                          </span> -->
                      </div>
                      <input id="passwordConfirmation" type="text" name="passwordConfirmation" placeholder="Confirme a senha" class="form-control bg-white border-left-0 border-md">
                  </div>
                  <div class="form-check" style="margin-left: 12px !important;">
                    <input class="form-check-input" type="checkbox" value="" id="defaultCheck1">
                    <label class="form-check-label" for="defaultCheck1">
                      Eu concordo com os <a  href="">Termos de uso</a>
                    </label>
                  </div>
                  <!-- Submit Button -->
                  <div class="form-group col-lg-12 d-flex justify-content-center">
                      <a href="/user/login" class="btn btn-primary btn-block py-2 mt-3">
                          <span class="font-weight-bold">Criar conta</span>
                      </a>
                  </div>
                  
                  <!-- Divider Text -->
                  <div class="form-group col-lg-12 mx-auto d-flex align-items-center my-4">
                      <div class="border-bottom w-100 ml-5"></div>
                      <span class="px-2 small text-muted font-weight-bold text-muted">Ou</span>
                      <div class="border-bottom w-100 mr-5"></div>
                  </div>

                  <!-- Already Registered -->
                  <div class="text-center w-100">
                      <p class="text-muted font-weight-bold">Já tem uma conta? <a href="user/login" class="text-primary ml-2">Login</a></p>
                  </div>

              </div>
          </form>
      </div>
  </div>
</div>
