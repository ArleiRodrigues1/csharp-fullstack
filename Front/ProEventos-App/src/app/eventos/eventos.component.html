<h2>Eventos</h2>

<hr>

<div class="row row-cols-lg-auto g-3 align-items-center">
  <div>
    <label class="visually-hidden" for="inlineFormInputGroupUsername"></label>
    <div class="input-group">
      <h4 class="mt-1">Filtro:</h4>
      <input type="text"
      class="form-control ms-3 mb-4"
      placeholder="Buscar..." 
      [(ngModel)]="filtroLista"
      />
    </div>
  </div>
</div>

<table class="table table-striped">
  <thead class="table-dark">
    <tr>
      <th class="text-center" scope="col">
        <button class="btn btn-outline-light btn-sm" (click)="alterarImg()">
          {{mostrarImg ? 'Ocultar'  : 'Exibir'}}
        </button>
      </th>
      <th class="text-center" scope="col">#</th>
      <th class="text-center" scope="col">Tema</th>
      <th class="text-center" scope="col">Data</th>
      <th class="text-center" scope="col">Local</th>
      <th class="text-center" scope="col">Público </th>
      <th class="text-center" scope="col">Opções</th>
    </tr>
  </thead>
  <tbody *ngIf="eventos && eventos.length">
    <tr *ngFor="let item of eventosFiltrados">
      <td class="text-center">
        <img *ngIf="mostrarImg"
         src="../../assets/{{item.imageUrl}}" alt="">
      </td>
      <td class="text-center">{{item.eventoId}}</td>
      <td class="text-center">{{item.tema}}</td>
      <td class="text-center">{{item.dataEvento}}</td>
      <td class="text-center">{{item.local}}</td>
      <td class="text-center">{{item.qtdPessoas}}</td>
      <td class="text-center">
        <button type="button" class="btn btn-primary btn-sm">Editar</button>
        <button type="button" class="btn btn-danger btn-sm btn-delete">Deletar</button>
      </td>
    </tr>
  </tbody>
  <tfoot>
    <tr *ngIf="!eventos.length">
      <td colspan="8" class="text-center">
        <h4>Nenhum evento encontrado !</h4>
      </td>
    </tr>
  </tfoot>
</table>
